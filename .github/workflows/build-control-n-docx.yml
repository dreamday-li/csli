name: Build Control-N DOCX

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
    paths:
      - 'scripts/build_control_n_docx.py'
      - 'artifacts/control_n_report_json_mapping_final.doc'
      - '.github/workflows/build-control-n-docx.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install python-docx beautifulsoup4
      - name: Build DOCX
        run: python scripts/build_control_n_docx.py
      - name: Prepare direct DOCX package
        run: |
          rm -rf docx_package
          mkdir -p docx_package
          unzip -q 'artifacts/控N分析报告_JSON结构映射说明_最终版.docx' -d docx_package
      - name: Commit generated DOCX
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate Control-N JSON mapping DOCX
          file_pattern: artifacts/*.docx
      - name: Upload normal DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-n-json-mapping-docx
          path: artifacts/控N分析报告_JSON结构映射说明_最终版.docx
      - name: Upload direct DOCX package artifact
        uses: actions/upload-artifact@v4
        with:
          name: control-n-json-mapping-docx-direct
          path: docx_package/
          include-hidden-files: true
          compression-level: 6
